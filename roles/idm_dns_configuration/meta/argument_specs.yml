---
argument_specs:
  main:
    short_description: Manage IDM DNS configuration
    description:
      - Manages DNS zones, forward zones, and DNS records
      - Configures global DNS settings
    author:
      - Red Hat Infrastructure Services
      - parmstro

    options:
      ipa_admin_principal:
        description: IPA admin principal for authentication
        type: str
        required: true

      ipa_admin_password:
        description: IPA admin password for authentication
        type: str
        required: true
        no_log: true

      idm_dns_zones:
        description: List of DNS zone definitions
        type: list
        elements: dict
        required: false
        options:
          name:
            description: DNS zone name
            type: str
            required: true
          state:
            description: Whether the zone should exist
            type: str
            required: false
            choices: [present, absent]
            default: present
          forwarders:
            description: DNS forwarders for this zone
            type: list
            elements: dict
            required: false
          allow_sync_ptr:
            description: Allow synchronization of forward and reverse records
            type: bool
            required: false
          dynamic_update:
            description: Allow dynamic DNS updates
            type: bool
            required: false

      idm_dns_forward_zones:
        description: List of DNS forward zone definitions
        type: list
        elements: dict
        required: false
        options:
          name:
            description: Forward zone name
            type: str
            required: true
          state:
            description: Whether the zone should exist
            type: str
            required: false
            choices: [present, absent]
            default: present
          forwarders:
            description: List of DNS forwarders
            type: list
            elements: dict
            required: true
          forward_policy:
            description: Forward policy
            type: str
            required: false
            choices: [first, only]
          skip_overlap_check:
            description: Skip overlap check
            type: bool
            required: false

      idm_dns_records:
        description: List of DNS record definitions
        type: list
        elements: dict
        required: false
        options:
          zone_name:
            description: DNS zone containing the record
            type: str
            required: true
          name:
            description: Record name
            type: str
            required: true
          record_type:
            description: DNS record type
            type: str
            required: true
            choices: [A, AAAA, CNAME, PTR, TXT, SRV, MX, NS]
          record_value:
            description: Record value
            type: str
            required: true
          state:
            description: Whether the record should exist
            type: str
            required: false
            choices: [present, absent]
            default: present

      idm_dns_global_configuration:
        description: Global DNS configuration settings
        type: dict
        required: false
